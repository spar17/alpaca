# Jupyter Book configuration
title: "ALPACA: Swaram Inventory Estimation in Carnatic Music"
author: Anonymous
logo: figures/vmmc_acc.png

# Build settings
only_build_toc_files: true

# HTML settings
html:
  use_issues_button: false
  use_repository_button: true
  use_edit_page_button: false
  home_page_in_navbar: false

# Repository
repository:
  url: https://github.com/anonymous/alpaca  # update with anonymous link before deployment
  branch: main
  path_to_book: .

# Execution — set to 'off' so the book builds from saved outputs without re-running
execute:
  execute_notebooks: "off"

# LaTeX
latex:
  latex_engine: pdflatex
